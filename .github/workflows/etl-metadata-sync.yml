# ETL Metadata Sync — Teams Excel → PostgreSQL (Graph API)
#
# 트리거:
#   - 수동 실행 (workflow_dispatch) — 날짜 범위 지정 가능
#   - 매일 07/10/13/16시 KST (3시간 간격) — 자동 동기화
#
# 필요 Secrets:
#   DATABASE_URL        — PostgreSQL 접속 URL
#   TEAMS_TENANT_ID     — Azure AD Tenant ID
#   TEAMS_CLIENT_ID     — Azure AD App Client ID
#   TEAMS_CLIENT_SECRET — Azure AD App Client Secret
#   SOURCE_DOC_ID       — OneDrive 파일 ID (Primary)
#   SOURCE_USER_EMAIL   — OneDrive 파일 소유자 이메일 (Optional)
#   FALLBACK_BASE_PATH  — OneDrive 폴더 경로 (Optional, Fallback)

name: ETL Metadata Sync

# 동시 실행 방지: 직전 run이 hang 상태이면 다음 cron은 취소가 아니라 대기
# (사건 ① 후보 ② "schedule run 겹침" 차단)
concurrency:
  group: etl-sync
  cancel-in-progress: false

on:
  # 수동 트리거 (GitHub UI에서 "Run workflow" 버튼)
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - all
          - date-range
      start_date:
        description: '시작 날짜 (YYYY-MM-DD) — date-range 모드 전용'
        required: false
        type: string
      end_date:
        description: '종료 날짜 (YYYY-MM-DD) — date-range 모드 전용'
        required: false
        type: string

  # 매일 07:00 / 10:00 / 13:00 / 16:00 KST (3시간 간격)
  schedule:
    - cron: '0 22 * * *'   # 07:00 KST (전날 22:00 UTC)
    - cron: '0 1 * * *'    # 10:00 KST
    - cron: '0 4 * * *'    # 13:00 KST
    - cron: '0 7 * * *'    # 16:00 KST

jobs:
  etl-sync:
    name: Run ETL Pipeline
    runs-on: ubuntu-latest
    # 30분 → 60분으로 확장 (2026-06-12)
    # 이유: 1542건 적재 시 배치당 ~11분 × 4배치 = 약 44분 필요 (Railway DB 네트워크 왕복 지연)
    # 6/11 cancel 사건도 동일 원인으로 추정. 근본 해결은 batch UPSERT 최적화 (별도 sprint)
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TEAMS_TENANT_ID: ${{ secrets.TEAMS_TENANT_ID }}
          TEAMS_CLIENT_ID: ${{ secrets.TEAMS_CLIENT_ID }}
          TEAMS_CLIENT_SECRET: ${{ secrets.TEAMS_CLIENT_SECRET }}
          SOURCE_DOC_ID: ${{ secrets.SOURCE_DOC_ID }}
          SOURCE_USER_EMAIL: ${{ secrets.SOURCE_USER_EMAIL }}
          FALLBACK_BASE_PATH: ${{ secrets.FALLBACK_BASE_PATH }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "⏰ 정기 자동 동기화 (반기 자동 필터)"
            python etl_main.py
          elif [ "${{ inputs.mode }}" = "date-range" ]; then
            echo "📅 날짜 범위: ${{ inputs.start_date }} ~ ${{ inputs.end_date }}"
            python etl_main.py --start ${{ inputs.start_date }} --end ${{ inputs.end_date }}
          elif [ "${{ inputs.mode }}" = "all" ]; then
            echo "🔄 전체 동기화"
            python etl_main.py --all
          else
            echo "📅 반기 자동 필터"
            python etl_main.py
          fi

      - name: Upload ETL results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: etl-result-${{ github.run_number }}
          path: output/etl_result.json
          retention-days: 30
          if-no-files-found: ignore

      # ── 실패/취소 시 결과 요약 작성 (메일 본문용) ──────
      # 성공 시는 GitHub Actions 대시보드에서 확인 (메일 발송 생략 — 일일 4통 노이즈 방지)
      # 실패 시만 부분 적재 통계(있으면) + 진단 정보 본문에 포함
      - name: 결과 요약 작성
        if: failure() || cancelled()
        run: |
          if [ -f output/etl_result.json ]; then
            TOTAL=$(jq -r '.total_extracted // "N/A"' output/etl_result.json)
            FILTERED=$(jq -r '.filtered // "N/A"' output/etl_result.json)
            INSERTED=$(jq -r '.inserted // "N/A"' output/etl_result.json)
            UPDATED=$(jq -r '.updated // "N/A"' output/etl_result.json)
            UNCHANGED=$(jq -r '.unchanged // "N/A"' output/etl_result.json)
            TIMESTAMP=$(jq -r '.timestamp // "N/A"' output/etl_result.json)
            SUMMARY="📊 실패 직전까지 부분 적재 결과:
            - 전체 추출: ${TOTAL}건
            - 필터 적용: ${FILTERED}건
            - 신규 적재: ${INSERTED}건
            - 변경 반영: ${UPDATED}건
            - 동일 스킵: ${UNCHANGED}건
            - 실행 시각: ${TIMESTAMP}"
          else
            SUMMARY="⚠️ output/etl_result.json 없음 (Extract/Load 완료 전 실패 또는 timeout)
            → Actions 로그의 [HH:MM:SS] 마지막 라인이 hang 위치"
          fi
          {
            echo "MAIL_BODY<<MAILEOF"
            echo "ETL 동기화 ${{ job.status }} 발생"
            echo ""
            echo "${SUMMARY}"
            echo ""
            echo "─────────────────────"
            echo "Repo:   ${{ github.repository }}"
            echo "Event:  ${{ github.event_name }}"
            echo "Mode:   ${{ inputs.mode || 'schedule' }}"
            echo "Run:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo "→ Run URL 클릭 후 'Run ETL Pipeline' step의 마지막 [HH:MM:SS] 라인 확인"
            echo "MAILEOF"
          } >> "$GITHUB_ENV"

      # ── SMTP 메일 알림 → dkkim1@gst-in.com (실패/취소 시만) ──
      # 필요 Secrets (Railway variables 동일 이름으로 복사):
      #   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM_NAME
      # 미등록 상태에서는 이 step만 실패 (ETL 적재 자체는 정상 완료)
      # 추후 brityworks 도입 시 이 step을 API call step으로 교체 예정
      - name: ETL 실패/취소 메일 알림
        if: failure() || cancelled()
        uses: dawidd6/action-send-mail@v17  # v13+ Node 24 호환
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: false        # 587/STARTTLS면 false, 465/SSL이면 true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: "${{ secrets.SMTP_FROM_NAME }} <${{ secrets.SMTP_USER }}>"
          to: dkkim1@gst-in.com
          subject: "🔴 ETL Sync ${{ job.status }} — run ${{ github.run_id }}"
          body: ${{ env.MAIL_BODY }}
