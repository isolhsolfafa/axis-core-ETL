# SMTP 설정 검증용 일회성 workflow
# 수동 실행 전용 — SMTP secrets 등록 후 메일 수신 여부 검증
# 검증 완료되면 이 파일은 삭제 권장 (또는 그대로 둬도 무해 — schedule 없음)

name: SMTP Test Mail

on:
  workflow_dispatch:

jobs:
  test-mail:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send test mail
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: false        # 587/STARTTLS면 false, 465/SSL이면 true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: "${{ secrets.SMTP_FROM_NAME }} <${{ secrets.SMTP_USER }}>"
          to: dkkim1@gst-in.com
          subject: "🧪 SMTP 설정 검증 메일 — CORE-ETL"
          body: |
            ✅ SMTP secrets 등록 검증 메일입니다.

            이 메일이 도착했다면 향후 ETL 실패/취소 시 자동 알림이 정상 동작합니다.

            ─────────────────────
            등록된 Secret (값은 노출 안 됨):
            - SMTP_HOST:      ✓ 등록됨
            - SMTP_PORT:      ✓ 등록됨
            - SMTP_USER:      ✓ 등록됨
            - SMTP_PASSWORD:  ✓ 등록됨
            - SMTP_FROM_NAME: ✓ 등록됨

            발신인 표시: ${{ secrets.SMTP_FROM_NAME }}
            수신자:      dkkim1@gst-in.com

            ─────────────────────
            Repo:    ${{ github.repository }}
            Run:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Trigger: ${{ github.event_name }} by ${{ github.actor }}

            (이 workflow는 검증용 — 운영 ETL과 별개)
